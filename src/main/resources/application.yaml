spring:
  config:
    import: optional:file:./application-local.yaml
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB
  datasource:
    username: ${DB_USERNAME:myuser}
    password: ${DB_PASSWORD:secret}
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mydatabase}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH0_ISSUER_URI:}
          audiences:
            - ${AUTH0_AUDIENCE:}

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  prompts:
    llm-extraction: classpath:prompts/llm-extraction-v1.txt
    vision-extraction: classpath:prompts/vision-extraction-v1.txt
